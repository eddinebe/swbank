{% extends "partials/base.html" %}

{% block title %}
    Account
{% endblock %}

{% block content %}
    <h1>Accounts</h1>
    <hr>

    <ul>
        {% for account in accounts %}
            <li>({{ account.pk }}): {{ account.name }} - Balance: ${{ account.balance }}</li>
        {% endfor %}
    </ul>
{% endblock %}
